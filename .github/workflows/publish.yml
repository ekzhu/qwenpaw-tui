name: Publish to PyPI

# Publishes `qwenpaw-tui` to PyPI when a GitHub Release is published, or
# manually via the Actions tab. Uses PyPI Trusted Publishing (OIDC) — no
# API token secret is needed; configure a trusted publisher for this repo at
# https://pypi.org/manage/project/qwenpaw-tui/settings/publishing/
# (workflow file: publish.yml, environment: pypi).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check distribution metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/qwenpaw-tui/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
